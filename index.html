<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avto Maze - Dino King Size</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Roboto Mono', monospace;
            background: #111 url('odz.png');
            background-size: cover;
            overflow: hidden;
        }

        .main-wrapper {
            display: flex;
            flex-direction: row;
            gap: 12px;
            align-items: flex-start;
            justify-content: center;
            padding: 16px;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(0, 0, 0, 0.78);
            padding: 12px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            z-index: 1000;
        }

        #game-container {
            position: relative;
            background: rgba(255, 255, 255, 0.16);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        #player {
            position: absolute;
            background: url('avto.png') no-repeat center;
            background-size: contain;
            z-index: 100;
        }

        .dino {
            position: absolute;
            background: url('dino.png') no-repeat center;
            background-size: contain;
            z-index: 95;
            width: 75px !important;
            height: 85px !important;
        }

        .btn {
            padding: 9px 10px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            color: white;
            background: #b91c1c;
            transition: 0.2s;
            text-align: center;
            width: 92px;
        }

        .btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.08);
        }

        .btn.active {
            background: #dc2626;
            box-shadow: 0 0 10px rgba(220, 38, 38, 0.7);
        }

        #timer-display {
            background: #b91c1c;
            color: white;
            padding: 9px;
            border-radius: 8px;
            text-align: center;
            font-size: 1rem;
            font-weight: 700;
        }

        .tweet-alert-popup {
            padding: 0 !important;
            border-radius: 14px !important;
            overflow: hidden !important;
            width: 92% !important;
            max-width: 520px !important;
            background: #0f172a !important;
            border: 1px solid rgba(255,255,255,0.08) !important;
            box-shadow: 0 0 30px rgba(0,0,0,0.55) !important;
            color: white !important;
        }

        .tweet-alert-image {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            height: auto !important;
            max-height: 75vh;
            object-fit: contain;
            display: block;
            border: none !important;
        }

        .tweet-alert-title {
            font-family: 'Roboto Mono', monospace !important;
            font-size: 20px !important;
            color: #ffffff !important;
            margin: 0 !important;
            padding-top: 16px !important;
        }

        .tweet-alert-html {
            font-family: 'Roboto Mono', monospace !important;
            color: #e5e7eb !important;
            text-align: left !important;
            padding: 8px 22px 6px 22px !important;
            line-height: 1.65 !important;
            font-size: 14px !important;
        }

        .tweet-alert-confirm {
            border: none !important;
            border-radius: 10px !important;
            padding: 10px 18px !important;
            font-family: 'Roboto Mono', monospace !important;
            font-weight: 700 !important;
            font-size: 13px !important;
            background: #b91c1c !important;
            color: white !important;
            box-shadow: none !important;
        }

        .tweet-alert-confirm:focus {
            box-shadow: none !important;
        }

        .instructions-content {
            text-align: left;
        }

        .instructions-content p {
            margin: 0 0 10px 0;
        }

        .instructions-content p:last-child {
            margin-bottom: 0;
        }

        @media (max-width: 768px) {
            .main-wrapper {
                flex-direction: column;
                align-items: center;
                gap: 10px;
                padding: 10px;
            }

            .sidebar {
                flex-direction: row;
                flex-wrap: wrap;
                width: 100%;
                justify-content: center;
                padding: 10px;
            }

            .btn {
                width: auto;
                min-width: 84px;
                flex: 1;
            }

            #timer-display {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="sidebar">
        <div id="timer-display">00:10</div>
        <button id="start-btn" class="btn" onclick="startGame()">▶ START</button>
        <button id="auto-btn" class="btn" onclick="toggleAutopilot()">🚀 AUTO</button>
        <button id="path-btn" class="btn" onclick="togglePath()">🗺️ POT</button>
        <button id="help-btn" class="btn" onclick="showInstructions()">ℹ NAVODILA</button>
        <button class="btn" onclick="location.reload()">🔄 RESET</button>
    </div>

    <div id="game-container">
        <canvas id="mazeCanvas"></canvas>
        <div id="player"></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('mazeCanvas');
    const ctx = canvas.getContext('2d');
    const playerEl = document.getElementById('player');
    const container = document.getElementById('game-container');

    const cols = 20;
    const rows = 25;

    let cellSize;
    let grid = [];
    let gameStarted = false;
    let isAutopilot = false;
    let showPath = false;
    let timerInterval = null;
    let timeLeft = 10;
    const keys = {};

    const player = {
        row: 0,
        col: 0,
        x: 0,
        y: 0,
        targetX: 0,
        targetY: 0,
        moving: false,
        speed: 0.25,
        angle: 0
    };

    let dino = null;

    function updateSizing() {
        const isMobile = window.innerWidth <= 768;

        cellSize = Math.floor(
            Math.min(
                (window.innerWidth - (isMobile ? 40 : 210)) / cols,
                (window.innerHeight - (isMobile ? 210 : 60)) / rows
            )
        );

        cellSize = Math.max(cellSize, 15);

        canvas.width = cols * cellSize;
        canvas.height = rows * cellSize;

        player.x = player.col * cellSize + cellSize / 2;
        player.y = player.row * cellSize + cellSize / 2;
        player.targetX = player.x;
        player.targetY = player.y;

        playerEl.style.width = (cellSize * 0.8) + "px";
        playerEl.style.height = (cellSize * 0.8) + "px";

        drawMaze();
        updateVisuals();
    }

    window.addEventListener('resize', updateSizing);

    window.addEventListener('keydown', (e) => {
        keys[e.code] = true;
        if (e.code.includes('Arrow')) e.preventDefault();
    });

    window.addEventListener('keyup', (e) => {
        keys[e.code] = false;
    });

    function showInstructions() {
        Swal.fire({
            title: 'NAVODILA',
            html: `
                <div class="instructions-content">
                    <p>🚗 Tvoj cilj je priti do konca labirinta, do zelenega polja.</p>
                    <p>🦖 Dinozaver, ki te sledi, te ne sme ujeti.</p>
                    <p>⌨ Premikaš se s puščicami na tipkovnici.</p>
                    <p>⏱ Ko čas poteče, se pojavi dinozaver in začne lov.</p>
                    <p>🗺 Gumb <b>POT</b> prikaže pot do cilja.</p>
                    <p>🚀 Gumb <b>AUTO</b> vključi samodejno vožnjo.</p>
                </div>
            `,
            confirmButtonText: 'Razumem',
            background: '#0f172a',
            color: '#ffffff',
            customClass: {
                popup: 'tweet-alert-popup',
                title: 'tweet-alert-title',
                htmlContainer: 'tweet-alert-html',
                confirmButton: 'tweet-alert-confirm'
            }
        });
    }

    function setupMaze() {
        grid = Array.from({ length: rows }, (_, r) =>
            Array.from({ length: cols }, (_, c) => ({
                r,
                c,
                walls: [true, true, true, true],
                visited: false
            }))
        );

        let stack = [];
        let current = grid[0][0];
        current.visited = true;

        while (true) {
            let neighbors = [];
            const { r, c } = current;

            if (r > 0 && !grid[r - 1][c].visited) neighbors.push(grid[r - 1][c]);
            if (r < rows - 1 && !grid[r + 1][c].visited) neighbors.push(grid[r + 1][c]);
            if (c > 0 && !grid[r][c - 1].visited) neighbors.push(grid[r][c - 1]);
            if (c < cols - 1 && !grid[r][c + 1].visited) neighbors.push(grid[r][c + 1]);

            if (neighbors.length > 0) {
                const next = neighbors[Math.floor(Math.random() * neighbors.length)];
                next.visited = true;
                stack.push(current);
                removeWalls(current, next);
                current = next;
            } else if (stack.length > 0) {
                current = stack.pop();
            } else {
                break;
            }
        }

        updateSizing();
    }

    function removeWalls(a, b) {
        const dr = a.r - b.r;
        const dc = a.c - b.c;

        if (dr === 1) {
            a.walls[0] = false;
            b.walls[2] = false;
        } else if (dr === -1) {
            a.walls[2] = false;
            b.walls[0] = false;
        }

        if (dc === 1) {
            a.walls[3] = false;
            b.walls[1] = false;
        } else if (dc === -1) {
            a.walls[1] = false;
            b.walls[3] = false;
        }
    }

    function drawMaze() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (showPath) {
            const path = findPath(player.row, player.col, rows - 1, cols - 1);
            if (path) {
                ctx.strokeStyle = "rgba(220, 38, 38, 0.7)";
                ctx.lineWidth = cellSize / 3;
                ctx.lineCap = "round";
                ctx.beginPath();
                ctx.moveTo(player.x, player.y);

                path.forEach(p => {
                    ctx.lineTo(
                        p.c * cellSize + cellSize / 2,
                        p.r * cellSize + cellSize / 2
                    );
                });

                ctx.stroke();
            }
        }

        ctx.strokeStyle = "rgba(0,0,0,0.8)";
        ctx.lineWidth = 2;
        ctx.beginPath();

        grid.flat().forEach(cell => {
            const x = cell.c * cellSize;
            const y = cell.r * cellSize;

            if (cell.walls[0]) {
                ctx.moveTo(x, y);
                ctx.lineTo(x + cellSize, y);
            }
            if (cell.walls[1]) {
                ctx.moveTo(x + cellSize, y);
                ctx.lineTo(x + cellSize, y + cellSize);
            }
            if (cell.walls[2]) {
                ctx.moveTo(x + cellSize, y + cellSize);
                ctx.lineTo(x, y + cellSize);
            }
            if (cell.walls[3]) {
                ctx.moveTo(x, y + cellSize);
                ctx.lineTo(x, y);
            }
        });

        ctx.stroke();

        ctx.fillStyle = "rgba(16, 185, 129, 0.8)";
        ctx.fillRect(
            (cols - 1) * cellSize + 4,
            (rows - 1) * cellSize + 4,
            cellSize - 8,
            cellSize - 8
        );
    }

    function findPath(sR, sC, eR, eC) {
        const queue = [[grid[sR][sC]]];
        const visited = new Set([`${sR},${sC}`]);

        while (queue.length > 0) {
            const path = queue.shift();
            const cell = path[path.length - 1];

            if (cell.r === eR && cell.c === eC) return path;

            [[-1, 0, 0], [0, 1, 1], [1, 0, 2], [0, -1, 3]].forEach(([dr, dc, w]) => {
                const nr = cell.r + dr;
                const nc = cell.c + dc;

                if (
                    nr >= 0 &&
                    nr < rows &&
                    nc >= 0 &&
                    nc < cols &&
                    !cell.walls[w] &&
                    !visited.has(`${nr},${nc}`)
                ) {
                    visited.add(`${nr},${nc}`);
                    queue.push([...path, grid[nr][nc]]);
                }
            });
        }

        return null;
    }

    function startGame() {
        if (gameStarted) return;

        gameStarted = true;
        document.getElementById('start-btn').style.display = "none";

        timerInterval = setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                document.getElementById('timer-display').innerText =
                    `00:${timeLeft < 10 ? '0' : ''}${timeLeft}`;

                if (timeLeft === 0) {
                    spawnDino();
                }
            }
        }, 1000);

        gameLoop();
    }

    function spawnDino() {
        if (dino) return;

        const el = document.createElement('div');
        el.className = 'dino';
        container.appendChild(el);

        dino = {
            el,
            row: 0,
            col: 0,
            x: cellSize / 2,
            y: cellSize / 2,
            targetX: cellSize / 2,
            targetY: cellSize / 2,
            moving: false,
            speed: 0.12,
            angle: 0
        };
    }

    function gameLoop() {
        if (!gameStarted) return;

        if (!player.moving) {
            if (isAutopilot) {
                const path = findPath(player.row, player.col, rows - 1, cols - 1);
                if (path && path.length > 1) {
                    moveEntityTo(player, path[1].r, path[1].c, false);
                }
            } else {
                const cell = grid[player.row][player.col];

                if (keys['ArrowUp'] && !cell.walls[0]) {
                    moveEntityTo(player, player.row - 1, player.col, false);
                } else if (keys['ArrowDown'] && !cell.walls[2]) {
                    moveEntityTo(player, player.row + 1, player.col, false);
                } else if (keys['ArrowLeft'] && !cell.walls[3]) {
                    moveEntityTo(player, player.row, player.col - 1, false);
                } else if (keys['ArrowRight'] && !cell.walls[1]) {
                    moveEntityTo(player, player.row, player.col + 1, false);
                }
            }
        }

        updateEntityPos(player);

        if (dino) {
            if (!dino.moving) {
                const path = findPath(dino.row, dino.col, player.row, player.col);
                if (path && path.length > 1) {
                    moveEntityTo(dino, path[1].r, path[1].c, true);
                }
            }

            updateEntityPos(dino);

            if (dino.row === player.row && dino.col === player.col) {
                gameStarted = false;
                clearInterval(timerInterval);

                Swal.fire({
                    title: 'Dino te je ujel!',
                    imageUrl: 'dino.jpg',
                    confirmButtonText: 'POSKUSI ZNOVA',
                    background: '#0f172a',
                    color: '#ffffff',
                    customClass: {
                        popup: 'tweet-alert-popup',
                        image: 'tweet-alert-image',
                        title: 'tweet-alert-title',
                        confirmButton: 'tweet-alert-confirm'
                    }
                }).then(() => location.reload());

                return;
            }
        }

        updateVisuals();

        if (player.row === rows - 1 && player.col === cols - 1) {
            gameStarted = false;
            clearInterval(timerInterval);

            Swal.fire({
                title: 'ZMAGA!',
                text: 'Uspešno si pobegnil dinozavru!',
                background: '#0f172a',
                color: '#ffffff',
                customClass: {
                    popup: 'tweet-alert-popup',
                    title: 'tweet-alert-title',
                    confirmButton: 'tweet-alert-confirm'
                }
            });
        } else {
            requestAnimationFrame(gameLoop);
        }
    }

    function moveEntityTo(ent, r, c, isDino) {
        if (isDino) {
            if (r > ent.row) ent.angle = 0;
            else if (c > ent.col) ent.angle = 270;
            else if (c < ent.col) ent.angle = 90;
            else if (r < ent.row) ent.angle = 180;
        } else {
            if (c > ent.col) ent.angle = 0;
            else if (r > ent.row) ent.angle = 90;
            else if (c < ent.col) ent.angle = 180;
            else if (r < ent.row) ent.angle = 270;
        }

        ent.row = r;
        ent.col = c;
        ent.targetX = c * cellSize + cellSize / 2;
        ent.targetY = r * cellSize + cellSize / 2;
        ent.moving = true;
    }

    function updateEntityPos(ent) {
        if (!ent.moving) return;

        ent.x += (ent.targetX - ent.x) * ent.speed;
        ent.y += (ent.targetY - ent.y) * ent.speed;

        if (Math.abs(ent.x - ent.targetX) < 0.5 && Math.abs(ent.y - ent.targetY) < 0.5) {
            ent.x = ent.targetX;
            ent.y = ent.targetY;
            ent.moving = false;

            if (showPath) drawMaze();
        }
    }

    function updateVisuals() {
        playerEl.style.left = player.x + "px";
        playerEl.style.top = player.y + "px";
        playerEl.style.transform = `translate(-50%, -50%) rotate(${player.angle}deg)`;

        if (dino) {
            dino.el.style.left = dino.x + "px";
            dino.el.style.top = dino.y + "px";
            dino.el.style.transform = `translate(-50%, -50%) rotate(${dino.angle}deg)`;
        }
    }

    function toggleAutopilot() {
        isAutopilot = !isAutopilot;
        document.getElementById('auto-btn').classList.toggle('active');
    }

    function togglePath() {
        showPath = !showPath;
        document.getElementById('path-btn').classList.toggle('active');
        drawMaze();
    }

    setupMaze();
</script>
</body>
</html>
